name: Build, Publish and Release Teraslice Asset
run-name: ${{ github.actor }} is building, publishing and releasing the Teraslice Asset
on:
  pull_request:
    branches:
      - master
      - release/file-assets-v*
    types:
      - closed

permissions: {}

jobs:
  call-master-asset-build:
    if: github.event.pull_request.merged == true
    uses: terascope/workflows/.github/workflows/asset-build-and-publish.yml@ce327af249470d5d00c81e9e80dc714c860ac5bb
    with:
      teraslice-cli-version: ${{ startsWith(github.base_ref, 'release/file-assets-v') && 'prerelease' || 'latest' }}
    permissions:
      id-token: write  # Required for OIDC
      contents: read
      pages: write     # to deploy to Pages
    secrets:
      RELEASES_PRIVATE_KEY: ${{ secrets.RELEASES_PRIVATE_KEY }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
